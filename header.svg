<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <style>
      @keyframes glitch-main {
        0%,88%,100% { transform:translate(0,0); opacity:1; }
        90%          { transform:translate(-4px, 1px); opacity:.85; }
        92%          { transform:translate( 4px,-2px); opacity:.9;  }
        94%          { transform:translate(-2px, 1px); opacity:.85; }
        96%          { transform:translate( 3px, 0);   opacity:1;  }
      }
      @keyframes glitch-red {
        0%,88%,100% { transform:translate(0,0); opacity:0; }
        90%          { transform:translate( 5px,-2px); opacity:.65; }
        92%          { transform:translate(-5px, 2px); opacity:.5;  }
        94%          { transform:translate( 3px,-1px); opacity:.6;  }
        96%          { transform:translate(0,0);        opacity:0;  }
      }
      @keyframes glitch-cyan {
        0%,88%,100% { transform:translate(0,0); opacity:0; }
        89%          { transform:translate(-6px, 2px); opacity:.5; }
        91%          { transform:translate( 6px,-2px); opacity:.4; }
        93%          { transform:translate(-3px, 1px); opacity:.5; }
        95%          { transform:translate(0,0);        opacity:0; }
      }
      @keyframes glow-pulse {
        0%,100% { filter:drop-shadow(0 0 6px #00f7ff) drop-shadow(0 0 18px #00f7ff88); }
        50%      { filter:drop-shadow(0 0 14px #00f7ff) drop-shadow(0 0 40px #00f7ffaa) drop-shadow(0 0 70px #7b2fff55); }
      }
      @keyframes scanline {
        0%   { transform:translateY(0px);   opacity:.7; }
        100% { transform:translateY(210px); opacity:.3; }
      }
      @keyframes blink-sub {
        0%,90%,100% { opacity:1; }
        95%          { opacity:.3; }
      }
      @keyframes border-dash {
        0%   { stroke-dashoffset:0; }
        100% { stroke-dashoffset:60; }
      }
      @keyframes dot-blink {
        0%,49%,100% { opacity:1; }
        50%,99%     { opacity:0; }
      }
      @keyframes particle-float {
        0%   { transform:translateY(0)   opacity:1; }
        100% { transform:translateY(-40px); opacity:0; }
      }
      @keyframes corner-flash {
        0%,95%,100% { opacity:1; }
        97%          { opacity:0; }
      }

      .bg          { fill:#070712; }
      .grid-h,.grid-v { stroke:#00f7ff12; stroke-width:.6; }
      .main-txt {
        font-family:'Courier New',Courier,monospace;
        font-size:62px; font-weight:900;
        letter-spacing:10px; fill:#00f7ff;
        animation: glitch-main 5s ease-in-out infinite,
                   glow-pulse  3s ease-in-out infinite;
      }
      .glitch-r {
        font-family:'Courier New',Courier,monospace;
        font-size:62px; font-weight:900;
        letter-spacing:10px; fill:#ff1a5e; opacity:0;
        animation: glitch-red 5s ease-in-out infinite;
      }
      .glitch-c {
        font-family:'Courier New',Courier,monospace;
        font-size:62px; font-weight:900;
        letter-spacing:10px; fill:#00ffe7; opacity:0;
        animation: glitch-cyan 5s ease-in-out infinite;
      }
      .sub-txt {
        font-family:'Courier New',Courier,monospace;
        font-size:12.5px; fill:#b07fff;
        letter-spacing:5px;
        filter:drop-shadow(0 0 6px #7b2fff);
        animation: blink-sub 7s infinite;
      }
      .label-txt {
        font-family:'Courier New',Courier,monospace;
        font-size:9px; fill:#00f7ff66; letter-spacing:2px;
      }
      .corner-tl,.corner-tr,.corner-bl,.corner-br {
        fill:none; stroke:#00f7ff; stroke-width:2;
        stroke-dasharray:30; stroke-dashoffset:0;
        animation: border-dash 3s linear infinite, corner-flash 5s infinite;
      }
      .scan { fill:url(#scanGrad); animation: scanline 2.8s linear infinite; }
      .dot  { fill:#00f7ff; animation: dot-blink 1s step-end infinite; }
      .dot2 { fill:#00f7ff; animation: dot-blink 1s step-end infinite .5s; }
      .p1   { fill:#00f7ff88; animation: particle-float 3s ease-out infinite; }
      .p2   { fill:#7b2fff88; animation: particle-float 4s ease-out infinite .8s; }
      .p3   { fill:#ff1a5e66; animation: particle-float 3.5s ease-out infinite 1.5s; }
      .p4   { fill:#00f7ff66; animation: particle-float 5s ease-out infinite .3s; }
      .p5   { fill:#b07fff66; animation: particle-float 4.5s ease-out infinite 2s; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#070712"/>
      <stop offset="45%"  stop-color="#0c0825"/>
      <stop offset="100%" stop-color="#070712"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00f7ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00f7ff" stop-opacity=".07"/>
      <stop offset="100%" stop-color="#00f7ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="860" height="200" fill="url(#bgGrad)" rx="14"/>

  <!-- Grid horizontals -->
  <line x1="0" y1="25"  x2="860" y2="25"  class="grid-h"/>
  <line x1="0" y1="50"  x2="860" y2="50"  class="grid-h"/>
  <line x1="0" y1="75"  x2="860" y2="75"  class="grid-h"/>
  <line x1="0" y1="100" x2="860" y2="100" class="grid-h"/>
  <line x1="0" y1="125" x2="860" y2="125" class="grid-h"/>
  <line x1="0" y1="150" x2="860" y2="150" class="grid-h"/>
  <line x1="0" y1="175" x2="860" y2="175" class="grid-h"/>

  <!-- Grid verticals -->
  <line x1="86"  y1="0" x2="86"  y2="200" class="grid-v"/>
  <line x1="172" y1="0" x2="172" y2="200" class="grid-v"/>
  <line x1="258" y1="0" x2="258" y2="200" class="grid-v"/>
  <line x1="344" y1="0" x2="344" y2="200" class="grid-v"/>
  <line x1="430" y1="0" x2="430" y2="200" class="grid-v"/>
  <line x1="516" y1="0" x2="516" y2="200" class="grid-v"/>
  <line x1="602" y1="0" x2="602" y2="200" class="grid-v"/>
  <line x1="688" y1="0" x2="688" y2="200" class="grid-v"/>
  <line x1="774" y1="0" x2="774" y2="200" class="grid-v"/>

  <!-- Floating particles -->
  <circle class="p1" cx="60"  cy="160" r="2.5"/>
  <circle class="p2" cx="180" cy="170" r="2"/>
  <circle class="p3" cx="700" cy="155" r="2.5"/>
  <circle class="p4" cx="790" cy="168" r="2"/>
  <circle class="p5" cx="430" cy="180" r="3"/>
  <circle class="p1" cx="310" cy="175" r="1.5"/>
  <circle class="p3" cx="550" cy="165" r="2"/>

  <!-- Corner decorations TL -->
  <polyline points="25,55 25,22 60,22"  class="corner-tl"/>
  <!-- TR -->
  <polyline points="835,55 835,22 800,22" class="corner-tr"/>
  <!-- BL -->
  <polyline points="25,145 25,178 60,178"  class="corner-bl"/>
  <!-- BR -->
  <polyline points="835,145 835,178 800,178" class="corner-br"/>

  <!-- System label top-left -->
  <text x="32" y="17" class="label-txt">SYS:QML_CORE v2.6</text>
  <!-- Blinking cursor top-right -->
  <rect x="800" y="8" width="7" height="12" class="dot"/>
  <!-- Status bottom-left -->
  <text x="32" y="193" class="label-txt">STATUS: ONLINE</text>
  <!-- Blinking dot bottom-right -->
  <rect x="820" y="183" width="6" height="10" class="dot2"/>

  <!-- Glitch text layers -->
  <text x="430" y="115" text-anchor="middle" class="glitch-c">KUSHAL KURKURE</text>
  <text x="430" y="115" text-anchor="middle" class="glitch-r">KUSHAL KURKURE</text>
  <text x="430" y="115" text-anchor="middle" class="main-txt">KUSHAL KURKURE</text>

  <!-- Subtitle -->
  <text x="430" y="152" text-anchor="middle" class="sub-txt">⚛ QUANTUM ML · DEEP LEARNING · VIDEOGRAPHY ⚛</text>

  <!-- Scanline sweep -->
  <rect x="0" y="0" width="860" height="25" class="scan" rx="0"/>

  <!-- Outer border -->
  <rect width="860" height="200" fill="none" stroke="#00f7ff18" stroke-width="1" rx="14"/>
</svg>
